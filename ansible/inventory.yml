all:
  vars:
    ansible_connection: ssh
    ansible_user: vagrant
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  children:
    vagrant-vm:
      hosts:
        vm_alma:
          ansible_host: 192.168.56.5
          ansible_ssh_private_key_file: /home/lokendra/vagrant/alma/.vagrant/machines/alma/virtualbox/private_key
        vm_debian:
          ansible_host: 192.168.56.4
          ansible_ssh_private_key_file: /home/lokendra/vagrant/debian/.vagrant/machines/debian/virtualbox/private_key
