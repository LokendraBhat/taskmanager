---
- name: Install Prometheus Node Exporter
  hosts: all
  become: yes
  vars:
    node_exporter_version: "1.10.2"
    node_exporter_user: "node_exporter"
    node_exporter_group: "node_exporter"
    install_dir: "/usr/local/bin"
    download_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    extract_dir: "/tmp/node_exporter-{{ node_exporter_version }}"

  tasks:

    - name: Ensure required packages are installed
      package:
        name:
          - tar
          - wget
        state: present

    - name: Download Node Exporter
      get_url:
        url: "{{ download_url }}"
        dest: "/tmp/node_exporter.tar.gz"
        mode: '0644'

    - name: Extract Node Exporter
      unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp/"
        remote_src: yes

    - name: Move binary to /usr/local/bin
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: "{{ install_dir }}/node_exporter"
        mode: '0755'
        owner: root
        group: root
        remote_src: yes

    - name: Create node_exporter group
      group:
        name: "{{ node_exporter_group }}"
        system: yes

    - name: Create node_exporter user
      user:
        name: "{{ node_exporter_user }}"
        group: "{{ node_exporter_group }}"
        shell: /sbin/nologin
        system: yes
        create_home: no

    - name: Set ownership of binary
      file:
        path: "{{ install_dir }}/node_exporter"
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_group }}"

    - name: Create systemd service file
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User={{ node_exporter_user }}
          Group={{ node_exporter_group }}
          Type=simple
          ExecStart={{ install_dir }}/node_exporter

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start node_exporter
      systemd:
        name: node_exporter
        enabled: yes
        state: started

    - name: Clean up files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/node_exporter.tar.gz"
        - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"

    - name: Check service status
      command: systemctl status node_exporter --no-pager
      register: node_status
      changed_when: false

    - name: Show status
      debug:
        var: node_status.stdout