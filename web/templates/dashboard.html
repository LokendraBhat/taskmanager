<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Go CRUD Dashboard</title>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">My Tasks</h1>
            <a href="/logout" class="text-sm text-red-600 hover:underline">Logout</a>
        </header>

        <form action="{{if .EditTask}}/task/update{{else}}/task/create{{end}}" method="POST" class="bg-white p-6 rounded-lg shadow-sm mb-8 flex gap-4">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            {{if .EditTask}}<input type="hidden" name="id" value="{{.EditTask.ID}}">{{end}}
            <input type="text" name="title" value="{{if .EditTask}}{{.EditTask.Title}}{{end}}" placeholder="Task title..." required class="flex-1 border rounded px-4 py-2">
            <input type="text" name="description" value="{{if .EditTask}}{{.EditTask.Description}}{{end}}" placeholder="Notes..." class="flex-1 border rounded px-4 py-2">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">{{if .EditTask}}Update{{else}}Add{{end}}</button>
            {{if .EditTask}}<a href="/dashboard" class="text-gray-600 px-4 py-2 hover:underline">Cancel</a>{{end}}
        </form>

        <div class="space-y-4">
            <table class="w-full bg-white rounded-lg shadow-sm overflow-hidden">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {{range .Tasks}}
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap {{if .Completed}}line-through text-gray-400{{end}}">{{.Title}}</td>
                        <td class="px-6 py-4 text-sm text-gray-500">{{.Description}}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <a href="/task/toggle?id={{.ID}}" class="px-3 py-1 text-xs font-medium rounded {{if .Completed}}bg-green-100 text-green-800 border border-green-300{{else}}bg-yellow-100 text-yellow-800 border border-yellow-300{{end}}">
                                {{if .Completed}}Done{{else}}Pending{{end}}
                            </a>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <a href="/dashboard?edit={{.ID}}" class="px-3 py-1 text-xs font-medium bg-blue-100 text-blue-800 border border-blue-300 rounded hover:bg-blue-200 mr-2">Edit</a>
                            <a href="/task/delete?id={{.ID}}" class="px-3 py-1 text-xs font-medium bg-red-100 text-red-800 border border-red-300 rounded hover:bg-red-200">Delete</a>
                        </td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="4" class="px-6 py-10 text-center text-gray-500">No tasks yet. Start by adding one above!</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
