<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
            <p class="text-slate-500 text-sm">Please enter your details to sign in</p>
        </div>

        {{if .Error}}
        <div class="mb-6 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center">
            {{.Error}}
        </div>
        {{end}}

        <form action="/login" method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <input type="text" name="username" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    placeholder="Enter username">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required 
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between text-xs text-slate-500">
                <label class="flex items-center">
                    <input type="checkbox" class="mr-1 rounded text-blue-600"> Remember me
                </label>
                <!-- <a href="#" class="text-blue-600 hover:underline">Forgot password?</a> -->
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200 shadow-md">
                Sign In
            </button>
        </form>

        <!-- <p class="mt-8 text-center text-sm text-slate-500">
            Don't have an account? 
            <a href="#" class="text-blue-600 font-semibold hover:underline">Sign up</a>
        </p> -->
    </div>

</body>
</html>
